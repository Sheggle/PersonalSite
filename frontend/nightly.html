<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nightly Agent — sheggle</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .nightly-wrap { max-width: 900px; margin: 3rem auto; padding: 0 1rem; }
      .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
      .filters button { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
      .filters button.active { background: #58a6ff; }
      .run-group { margin-bottom: 2rem; }
      .run-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.6rem 1rem; background: #161b22; border: 1px solid #30363d;
        border-radius: 8px 8px 0 0; font-size: 0.9rem; color: #8b949e;
      }
      .run-header .run-info { display: flex; gap: 1rem; align-items: center; }
      .run-header .batch-btns { display: flex; gap: 0.5rem; }
      .run-header .batch-btns button { font-size: 0.75rem; padding: 0.3rem 0.6rem; }
      .card {
        background: #0d1117; border: 1px solid #30363d; border-top: none;
        padding: 1rem 1.2rem;
      }
      .card:last-child { border-radius: 0 0 8px 8px; }
      .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
      .card-meta { font-size: 0.8rem; color: #8b949e; margin-top: 0.3rem; }
      .card-meta span { margin-right: 0.8rem; }
      .card h3 { margin: 0; font-size: 1rem; }
      .card p.rationale { color: #c9d1d9; font-size: 0.9rem; margin: 0.5rem 0; }
      .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
      .btn-accept { background: #238636; }
      .btn-reject { background: #da3633; }
      .btn-accept:hover { background: #2ea043; }
      .btn-reject:hover { background: #e5534b; }
      .status-badge {
        display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.5rem;
        border-radius: 12px; font-weight: 600;
      }
      .status-accepted { background: #238636; color: #fff; }
      .status-rejected { background: #da3633; color: #fff; }
      .status-pending { background: #1f6feb; color: #fff; }
      .diff-toggle {
        background: none; color: #58a6ff; border: 1px solid #30363d;
        font-size: 0.8rem; padding: 0.3rem 0.6rem; margin-top: 0.5rem;
      }
      .diff-view {
        display: none; margin-top: 0.5rem; font-size: 0.82rem;
        line-height: 1.5; white-space: pre-wrap; word-break: break-all;
        background: #161b22; border: 1px solid #30363d; border-radius: 6px;
        padding: 0.8rem; overflow-x: auto;
      }
      .diff-view.open { display: block; }
      .diff-add { color: #3fb950; }
      .diff-del { color: #f85149; }
      .diff-hunk { color: #79c0ff; }
      .status-revision_requested { background: #d29922; color: #fff; }
      .status-completed { background: #1a7f37; color: #fff; }
      .change-file { font-size: 0.8rem; color: #58a6ff; margin-top: 0.5rem; font-family: monospace; }
      .feedback-area {
        width: 100%; min-height: 60px; margin-top: 0.5rem;
        background: #0d1117; color: #e6edf3; border: 1px solid #30363d;
        border-radius: 6px; padding: 0.6rem; font-size: 0.85rem;
        resize: vertical; box-sizing: border-box; font-family: inherit;
      }
      .btn-revise { background: #d29922; }
      .btn-revise:hover { background: #e3b341; }
      .feedback-display {
        margin-top: 0.5rem; padding: 0.5rem 0.8rem;
        background: rgba(210, 153, 34, 0.1);
        border-left: 3px solid #d29922; border-radius: 4px;
        font-size: 0.85rem; color: #e6edf3;
      }
      .feedback-display .feedback-label {
        font-size: 0.75rem; color: #d29922; font-weight: 600; margin-bottom: 0.2rem;
      }
      .empty { text-align: center; color: #8b949e; padding: 3rem 0; }
      .auth-prompt {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8);
        display: flex; align-items: center; justify-content: center; z-index: 100;
      }
      .auth-box {
        background: #161b22; border: 1px solid #30363d; border-radius: 12px;
        padding: 2rem; max-width: 400px; width: 90%;
      }
      .auth-box input {
        width: 100%; padding: 0.6rem; background: #0d1117; color: #e6edf3;
        border: 1px solid #30363d; border-radius: 6px; margin: 0.8rem 0;
        box-sizing: border-box;
      }
      .back-link { display: inline-block; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="nightly-wrap">
      <a href="/" class="back-link">&larr; sheggle</a>
      <h1>Nightly Agent</h1>
      <p id="status" style="color: #8b949e; margin-bottom: 1.5rem;">Loading...</p>

      <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="accepted">Accepted</button>
        <button data-filter="rejected">Rejected</button>
        <button data-filter="revision_requested">Revision</button>
        <button data-filter="completed">Completed</button>
      </div>

      <div id="proposals"></div>
    </div>

    <div id="auth-overlay" class="auth-prompt" style="display:none;">
      <div class="auth-box">
        <h2>API Key</h2>
        <p style="color: #8b949e; font-size: 0.9rem;">Enter your PP API key to access nightly proposals.</p>
        <input type="password" id="key-input" placeholder="pp-..." />
        <button id="key-submit" style="width:100%;">Connect</button>
      </div>
    </div>

    <script type="module">
      const API = location.origin + '/api/nightly';
      let apiKey = localStorage.getItem('pp_api_key') || '';
      let currentFilter = 'all';
      let proposals = [];

      const statusEl = document.getElementById('status');
      const container = document.getElementById('proposals');
      const overlay = document.getElementById('auth-overlay');

      // Auth
      if (!apiKey) showAuth();

      function showAuth() {
        overlay.style.display = 'flex';
        document.getElementById('key-input').focus();
      }

      document.getElementById('key-submit').onclick = () => {
        apiKey = document.getElementById('key-input').value.trim();
        if (apiKey) {
          localStorage.setItem('pp_api_key', apiKey);
          overlay.style.display = 'none';
          load();
        }
      };

      document.getElementById('key-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('key-submit').click();
      });

      // Filters
      document.querySelectorAll('.filters button').forEach(btn => {
        btn.onclick = () => {
          document.querySelector('.filters .active').classList.remove('active');
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          render();
        };
      });

      async function apiFetch(path, opts = {}) {
        const res = await fetch(API + path, {
          ...opts,
          headers: { 'X-PP-Key': apiKey, 'Content-Type': 'application/json', ...opts.headers },
        });
        if (res.status === 401) {
          localStorage.removeItem('pp_api_key');
          showAuth();
          throw new Error('Unauthorized');
        }
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        if (res.status === 204) return null;
        return res.json();
      }

      async function load() {
        try {
          proposals = await apiFetch('/proposals');
          statusEl.textContent = `${proposals.length} proposal${proposals.length !== 1 ? 's' : ''} total`;
          render();
        } catch (e) {
          if (e.message !== 'Unauthorized') {
            statusEl.textContent = 'Failed to load proposals';
          }
        }
      }

      function render() {
        const filtered = currentFilter === 'all'
          ? proposals
          : proposals.filter(p => p.status === currentFilter);

        if (filtered.length === 0) {
          container.innerHTML = `<div class="empty">No ${currentFilter === 'all' ? '' : currentFilter + ' '}proposals</div>`;
          return;
        }

        // Group by run
        const runs = {};
        for (const p of filtered) {
          if (!runs[p.run_id]) runs[p.run_id] = [];
          runs[p.run_id].push(p);
        }

        let html = '';
        for (const [runId, items] of Object.entries(runs)) {
          const date = new Date(items[0].created_at).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const hasActionable = items.some(p => p.status === 'pending' || p.status === 'revision_requested');

          html += `<div class="run-group">`;
          html += `<div class="run-header">
            <div class="run-info">
              <span>${items[0].project}</span>
              <span>${date}</span>
              <span>${items.length} proposal${items.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="batch-btns">
              ${hasActionable ? `
                <button class="btn-accept" onclick="batchUpdate('${runId}','accepted')">Accept All</button>
                <button class="btn-revise" onclick="batchRevise('${runId}')">Revise All</button>
                <button class="btn-reject" onclick="batchUpdate('${runId}','rejected')">Reject All</button>
              ` : ''}
            </div>
          </div>`;

          for (const p of items) {
            html += renderCard(p);
          }
          html += `</div>`;
        }

        container.innerHTML = html;
      }

      function renderCard(p) {
        const fbId = `fb-${p.id}`;
        const isActionable = p.status === 'pending' || p.status === 'revision_requested';
        const feedbackDisplay = p.feedback
          ? `<div class="feedback-display"><div class="feedback-label">Feedback</div>${esc(p.feedback)}</div>`
          : '';
        const changesHtml = (p.changes || []).map((c, i) => {
          const diffId = `diff-${p.id}-${i}`;
          return `<div class="change-file">${esc(c.file_path)}</div>
            <button class="diff-toggle" onclick="toggleDiff('${diffId}')">Show diff</button>
            <div class="diff-view" id="${diffId}">${highlightDiff(c.diff)}</div>`;
        }).join('');
        const fileSummary = (p.changes || []).map(c => esc(c.file_path)).join(', ');
        return `<div class="card" id="card-${p.id}">
          <div class="card-top">
            <div>
              <h3>${esc(p.title)}</h3>
              <div class="card-meta">
                <span>${fileSummary}</span>
                <span class="status-badge status-${p.status}">${p.status.replace('_', ' ')}</span>
                ${p.source === 'command' ? `<span>cmd</span>` : ''}
              </div>
              <p class="rationale">${esc(p.rationale)}</p>
              ${feedbackDisplay}
              ${changesHtml}
              ${isActionable ? `<textarea class="feedback-area" id="${fbId}" placeholder="Feedback for revision..."></textarea>` : ''}
            </div>
            <div class="card-actions">
              ${isActionable ? `
                <button class="btn-accept" onclick="updateProposal('${p.id}','accepted')">Accept</button>
                <button class="btn-revise" onclick="reviseProposal('${p.id}')">Revise</button>
                <button class="btn-reject" onclick="updateProposal('${p.id}','rejected')">Reject</button>
              ` : ''}
            </div>
          </div>
        </div>`;
      }

      function highlightDiff(diff) {
        return esc(diff).split('\n').map(line => {
          if (line.startsWith('+')) return `<span class="diff-add">${line}</span>`;
          if (line.startsWith('-')) return `<span class="diff-del">${line}</span>`;
          if (line.startsWith('@@')) return `<span class="diff-hunk">${line}</span>`;
          return line;
        }).join('\n');
      }

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      window.toggleDiff = function(id) {
        const el = document.getElementById(id);
        el.classList.toggle('open');
        const btn = el.previousElementSibling;
        btn.textContent = el.classList.contains('open') ? 'Hide diff' : 'Show diff';
      };

      window.updateProposal = async function(id, status) {
        const fbEl = document.getElementById(`fb-${id}`);
        const feedback = fbEl ? fbEl.value.trim() : '';
        const body = { status };
        if (feedback) body.feedback = feedback;
        try {
          await apiFetch(`/proposals/${id}`, {
            method: 'PATCH',
            body: JSON.stringify(body),
          });
          await load();
        } catch (e) {
          alert('Failed to update: ' + e.message);
        }
      };

      window.reviseProposal = async function(id) {
        const fbEl = document.getElementById(`fb-${id}`);
        const feedback = fbEl ? fbEl.value.trim() : '';
        if (!feedback) {
          alert('Please enter feedback before requesting revision.');
          return;
        }
        try {
          await apiFetch(`/proposals/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'revision_requested', feedback }),
          });
          await load();
        } catch (e) {
          alert('Failed to request revision: ' + e.message);
        }
      };

      window.batchUpdate = async function(runId, status) {
        try {
          await apiFetch(`/runs/${runId}`, {
            method: 'PATCH',
            body: JSON.stringify({ status }),
          });
          await load();
        } catch (e) {
          alert('Failed to update run: ' + e.message);
        }
      };

      window.batchRevise = async function(runId) {
        const feedback = prompt('Enter feedback for all pending proposals in this run:');
        if (!feedback) return;
        try {
          await apiFetch(`/runs/${runId}`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'revision_requested', feedback }),
          });
          await load();
        } catch (e) {
          alert('Failed to request revision: ' + e.message);
        }
      };

      if (apiKey) load();
    </script>
  </body>
</html>
